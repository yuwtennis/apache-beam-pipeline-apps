name: Java CI

on:
  push:
    branches-ignore:
      - main

# TODO checkstyle
# TODO cache
jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.0.0
      - uses: actions/setup-java@v5.0.0
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'gradle'
      - name: Execute Gradle test
        run: ./gradlew test
      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
